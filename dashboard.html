  <script>
    const SUPABASE_URL = "https://ksqgxnfvqvyseivwzgaf.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_CVVb_9oBaayoatvTLmLDbg_xVlNP3he";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Écouteur global en temps réel de la session Supabase
    supabaseClient.auth.onAuthStateChange((event, session) => {
      console.log("Auth Event:", event, "Session active:", !!session);

      if (session) {
        // L'utilisateur est authentifié avec succès
        
        // 1. Masquer l'écran de chargement initial proprement
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('opacity-0');
          setTimeout(() => loader.remove(), 500); // Supprime l'élément après l'effet de fade
        }

        // 2. Injecter les informations utilisateur réelles dans la barre latérale
        document.getElementById('user-display-email').innerText = session.user.email;
        document.getElementById('user-display-id').innerText = `ID: ${session.user.id.substring(0, 8)}`;
        
        // 3. Initialiser le premier onglet principal si la zone est vide
        if (!document.getElementById('dynamic-content').innerHTML.trim()) {
          switchTab('espace');
        }
      } else {
        // Si aucun jeton n'est détecté après analyse complète, redirection immédiate vers l'auth
        setTimeout(() => {
          if (!session) {
            window.location.href = "auth.html";
          }
        }, 800);
      }
    });

    // Gestion réelle de la Déconnexion Supabase
    async function handleLogout() {
      await supabaseClient.auth.signOut();
      window.location.href = "auth.html";
    }

    // Routage dynamique par onglets
    function switchTab(tabId) {
      const container = document.getElementById('dynamic-content');
      const template = document.getElementById(`tpl-${tabId}`);
      if (!template) return;

      container.innerHTML = '';
      const clone = template.content.cloneNode(true);
      container.appendChild(clone);

      const tabs = ['espace', 'produits', 'news', 'settings'];
      tabs.forEach(t => {
        const btn = document.getElementById(`btn-tab-${t}`);
        if(btn) btn.classList.toggle('sidebar-link-active', t === tabId);
      });

      lucide.createIcons();
      if (window.innerWidth < 768) toggleMobileSidebar(true);
    }

    // Gestion de la sidebar responsive (Mobile)
    function toggleMobileSidebar(forceClose = null) {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const isOpen = !sidebar.classList.contains('-translate-x-full');
      const shouldClose = forceClose !== null ? forceClose : isOpen;
      
      sidebar.classList.toggle('-translate-x-full', shouldClose);
      overlay.classList.toggle('hidden', shouldClose);
    }
  </script>
