<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HubForge - Tableau de Bord</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #040209; }
    .text-neon-purple { text-shadow: 0 0 10px rgba(167, 139, 250, 0.5); color: #a78bfa; }
    .card-cyber { background: rgba(22, 25, 37, 0.6); border: 1px solid rgba(88, 80, 236, 0.1); backdrop-filter: blur(12px); transition: all 0.3s ease; }
    .card-cyber:hover { border-color: rgba(88, 80, 236, 0.3); transform: translateY(-2px); }
    .sidebar-link-active { background-color: rgba(88, 80, 236, 0.15); color: #ffffff; border-left: 3px solid #5850ec; }
    .modal-blur { backdrop-filter: blur(16px); background: rgba(4, 2, 9, 0.85); }
  </style>
</head>
<body class="text-gray-300 font-sans min-h-screen box-border flex flex-col hidden" id="dashboard-body">

  <nav class="border-b border-indigo-950/40 bg-[#020204]/90 backdrop-blur-md fixed top-0 w-full z-50 px-4 sm:px-6 py-4 flex justify-between items-center box-border">
    <div class="flex items-center gap-3">
      <button onclick="toggleMobileSidebar()" class="md:hidden text-gray-400 hover:text-white cursor-pointer p-1">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
      <div class="flex items-center gap-2 font-black text-lg sm:text-xl text-white tracking-wider flex-shrink-0">
        <div class="p-2 bg-indigo-500/10 rounded-lg text-indigo-400 border border-indigo-500/20">
          <i data-lucide="layers" class="w-5 h-5"></i>
        </div>
        HUB<span class="text-neon-purple">FORGE</span>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <div class="hidden sm:flex items-center gap-2 bg-indigo-950/30 border border-indigo-900/40 px-3 py-1.5 rounded-xl text-xs">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
        <span class="text-gray-400 font-medium">Studio Actif</span>
      </div>
      <button onclick="handleLogout()" class="text-xs font-semibold text-gray-400 hover:text-red-400 flex items-center gap-1.5 transition-colors cursor-pointer bg-transparent border-0">
        <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden xs:inline">Déconnexion</span>
      </button>
    </div>
  </nav>

  <div id="sidebar-overlay" onclick="toggleMobileSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden backdrop-blur-sm"></div>

  <div class="flex flex-1 pt-18 min-h-screen box-border">
    <aside id="sidebar" class="fixed md:sticky top-18 left-0 h-[calc(100vh-4.5rem)] w-64 bg-[#020204]/95 md:bg-transparent border-r border-indigo-950/40 md:border-r-0 pt-6 px-4 box-border transition-transform duration-300 -translate-x-full md:translate-x-0 z-40 md:z-10 flex flex-col justify-between pb-6">
      <div class="space-y-1">
        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-3 mb-3">Studio & Hub</p>
        <button onclick="switchTab('espace')" id="btn-tab-espace" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-xs font-semibold text-gray-400 hover:text-white hover:bg-indigo-950/20 transition-all cursor-pointer text-left border-0"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Mon Espace (Global)</button>
        <button onclick="switchTab('produits')" id="btn-tab-produits" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-xs font-semibold text-gray-400 hover:text-white hover:bg-indigo-950/20 transition-all cursor-pointer text-left border-0"><i data-lucide="shopping-bag" class="w-4 h-4"></i> Marketplace & Contenus</button>
        <button onclick="switchTab('news')" id="btn-tab-news" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-xs font-semibold text-gray-400 hover:text-white hover:bg-indigo-950/20 transition-all cursor-pointer text-left border-0"><i data-lucide="megaphone" class="w-4 h-4"></i> Actualités Admin <span class="ml-auto bg-indigo-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-md">New</span></button>
        <button onclick="switchTab('settings')" id="btn-tab-settings" class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-xs font-semibold text-gray-400 hover:text-white hover:bg-indigo-950/20 transition-all cursor-pointer text-left border-0"><i data-lucide="settings" class="w-4 h-4"></i> Configuration Store</button>
      </div>

      <div class="card-cyber p-3.5 rounded-xl flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-indigo-600/20 border border-indigo-500/30 flex items-center justify-center text-indigo-400 font-bold text-sm">U</div>
        <div class="overflow-hidden">
          <p class="text-xs font-bold text-white truncate" id="user-display-email">Chargement...</p>
          <p class="text-[10px] text-gray-500 truncate" id="user-display-id">ID: --</p>
        </div>
      </div>
    </aside>

    <main class="flex-1 p-4 sm:p-6 md:p-8 max-w-5xl mx-auto w-full box-border overflow-x-hidden">
      <div id="dynamic-content" class="space-y-6"></div>
    </main>
  </div>

  <div id="product-modal" class="fixed inset-0 z-50 modal-blur flex items-center justify-center p-4 box-border hidden">
    <div class="w-full max-w-3xl bg-[#0d0a1b] border border-indigo-950 rounded-2xl max-h-[90vh] overflow-y-auto flex flex-col box-border shadow-2xl relative">
      <button onclick="closeProductModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white z-10 p-1 cursor-pointer bg-gray-950/40 border border-gray-900 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
      <div id="modal-media-zone" class="w-full bg-black flex items-center justify-center relative min-h-[220px] sm:min-h-[340px]"></div>
      <div class="p-6 space-y-4">
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-2">
          <div>
            <span id="modal-badge-type" class="text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">TYPE</span>
            <h2 id="modal-title" class="text-xl font-black text-white mt-1">Titre</h2>
          </div>
          <div id="modal-price" class="text-lg font-black text-indigo-400 sm:text-right">0.00 €</div>
        </div>
        <p id="modal-description" class="text-xs text-gray-400 leading-relaxed">Description...</p>
        <div class="flex flex-wrap items-center justify-between gap-3 pt-3 border-t border-indigo-950/50">
          <div class="flex items-center gap-1">
            <div class="flex text-amber-400" id="modal-stars-container"></div>
            <span id="modal-rating-value" class="text-xs font-bold text-white ml-1">0.0</span>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="alert('Ajouté aux favoris !')" class="p-2 bg-indigo-950/40 border border-indigo-900/40 rounded-xl text-gray-400 hover:text-pink-500 transition-colors cursor-pointer"><i data-lucide="heart" class="w-4 h-4"></i></button>
            <button onclick="navigator.clipboard.writeText(window.location.href); alert('Lien copié !')" class="p-2 bg-indigo-950/40 border border-indigo-900/40 rounded-xl text-gray-400 hover:text-white transition-colors cursor-pointer"><i data-lucide="copy" class="w-4 h-4"></i></button>
            <button onclick="alert('Signalement envoyé à l\'administrateur.')" class="px-3 py-2 bg-red-950/20 border border-red-900/30 rounded-xl text-xs font-semibold text-red-400 hover:bg-red-950/40 transition-colors cursor-pointer flex items-center gap-1"><i data-lucide="flag" class="w-3.5 h-3.5"></i> Signaler</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <template id="tpl-espace">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-2">
      <div>
        <h1 class="text-2xl font-black text-white tracking-wide uppercase">Mon Espace</h1>
        <p class="text-xs text-gray-400">Statistiques de votre réseau de vente international.</p>
      </div>
      <div class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest bg-indigo-500/10 border border-indigo-500/30 text-indigo-400">Premium Plan</div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div class="card-cyber p-5 rounded-2xl flex items-center gap-4">
        <div class="p-3 bg-emerald-500/10 rounded-xl text-emerald-400"><i data-lucide="wallet" class="w-6 h-6"></i></div>
        <div>
          <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Revenus nets (€)</p>
          <h3 class="text-xl font-black text-white mt-0.5">3 450,00 €</h3>
        </div>
      </div>
      <div class="card-cyber p-5 rounded-2xl flex items-center gap-4">
        <div class="p-3 bg-indigo-500/10 rounded-xl text-indigo-400"><i data-lucide="package" class="w-6 h-6"></i></div>
        <div>
          <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Catalogue Marketplace</p>
          <h3 class="text-xl font-black text-white mt-0.5">4 Éléments</h3>
        </div>
      </div>
      <div class="card-cyber p-5 rounded-2xl flex items-center gap-4">
        <div class="p-3 bg-amber-500/10 rounded-xl text-amber-400"><i data-lucide="database" class="w-6 h-6"></i></div>
        <div>
          <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Consommation Objets</p>
          <h3 class="text-xl font-black text-white mt-0.5">0.8 / 5.0 Go</h3>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-produits">
    <div class="space-y-4">
      <div><h1 class="text-2xl font-black text-white tracking-wide uppercase">Marketplace HubForge</h1></div>
      <div class="card-cyber p-4 rounded-xl grid grid-cols-2 sm:grid-cols-4 gap-3 text-xs">
        <div>
          <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Format</label>
          <select class="w-full bg-[#161925] border border-indigo-950/60 rounded-xl p-2.5 text-white"><option value="all">Tous les types</option></select>
        </div>
        <div>
          <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Tarification</label>
          <select class="w-full bg-[#161925] border border-indigo-950/60 rounded-xl p-2.5 text-white"><option value="all">Tout voir</option></select>
        </div>
        <div>
          <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Trier par</label>
          <select class="w-full bg-[#161925] border border-indigo-950/60 rounded-xl p-2.5 text-white"><option value="rating">Meilleures notes (★)</option></select>
        </div>
        <div class="col-span-2 sm:col-span-1 flex items-end">
          <button class="w-full bg-indigo-600 text-white font-bold py-2.5 px-4 rounded-xl uppercase text-[10px]">Filtrer</button>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="card-cyber p-5 rounded-2xl flex flex-col justify-between cursor-pointer" onclick="openProductModal('video')">
          <div><h4 class="text-sm font-bold text-white flex items-center gap-1.5"><i data-lucide="video" class="w-4 h-4 text-indigo-400"></i> Masterclass Game Dev Horror</h4></div>
        </div>
        <div class="card-cyber p-5 rounded-2xl flex flex-col justify-between cursor-pointer" onclick="openProductModal('photo')">
          <div><h4 class="text-sm font-bold text-white flex items-center gap-1.5"><i data-lucide="image" class="w-4 h-4 text-purple-400"></i> Pack Textures Cyber-Neon v4</h4></div>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-news">
    <div class="card-cyber p-5 rounded-2xl space-y-2">
      <h3 class="text-sm font-bold text-white">Lancement Multi-Formats</h3>
      <p class="text-xs text-gray-400">Toutes les valeurs de devises sont fixées en Euros (€).</p>
    </div>
  </template>
  <template id="tpl-settings">
    <div class="card-cyber p-6 rounded-2xl"><h3 class="text-sm font-bold text-white uppercase">Configuration Store</h3></div>
  </template>

  <script>
    // Configuration réelle stockée
    const SUPABASE_URL = "https://ksqgxnfvqvyseivwzgaf.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_CVVb_9oBaayoatvTLmLDbg_xVlNP3he";

    // Utilisation explicite de l'objet global window.supabase fourni par le CDN
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Vérification de sécurité de la Session
    async function checkUserSession() {
      try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();

        if (error || !session) {
          alert("Accès refusé. Veuillez vous connecter.");
          window.location.href = "auth.html";
          return;
        }

        // Session valide : Rendre visible et injecter les infos utilisateur
        document.getElementById('dashboard-body').classList.remove('hidden');
        document.getElementById('user-display-email').innerText = session.user.email;
        document.getElementById('user-display-id').innerText = `ID: ${session.user.id.substring(0, 8)}`;
        
        switchTab('espace');
      } catch (err) {
        console.error("Erreur de session:", err);
      }
    }

    // Gestion de la Déconnexion
    async function handleLogout() {
      await supabaseClient.auth.signOut();
      window.location.href = "auth.html";
    }

    // Routage dynamique par onglets
    box-border;
    function switchTab(tabId) {
      const container = document.getElementById('dynamic-content');
      const template = document.getElementById(`tpl-${tabId}`);
      if (!template) return;

      container.innerHTML = '';
      const clone = template.content.cloneNode(true);
      container.appendChild(clone);

      const tabs = ['espace', 'produits', 'news', 'settings'];
      tabs.forEach(t => {
        const btn = document.getElementById(`btn-tab-${t}`);
        if(btn) btn.classList.toggle('sidebar-link-active', t === tabId);
      });

      lucide.createIcons();
      if (window.innerWidth < 768) toggleMobileSidebar(true);
    }

    // Modale Produits (Mock Data)
    const productDataMock = {
      video: { title: "Masterclass Game Dev Horror", type: "Vidéo / Stream", price: "29.00 €", description: "TPS horror content flow.", rating: "5.0", stars: "★★★★★", mediaHtml: `<div class="p-6 text-xs text-white">Lecteur Cyber Sécurisé Actif</div>` },
      photo: { title: "Pack Textures Cyber-Neon v4", type: "Asset Graphique", price: "15.00 €", description: "Esthétique violette.", rating: "4.2", stars: "★★★★☆", mediaHtml: `<div class="p-6 text-xs text-white">Aperçu Galerie</div>` }
    };

    function openProductModal(productId) {
      const data = productDataMock[productId];
      if (!data) return;
      document.getElementById('modal-title').innerText = data.title;
      document.getElementById('modal-badge-type').innerText = data.type;
      document.getElementById('modal-price').innerText = data.price;
      document.getElementById('modal-description').innerText = data.description;
      document.getElementById('modal-rating-value').innerText = data.rating;
      document.getElementById('modal-stars-container').innerText = data.stars;
      document.getElementById('modal-media-zone').innerHTML = data.mediaHtml;
      document.getElementById('product-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    function closeProductModal() { document.getElementById('product-modal').classList.add('hidden'); }
    function toggleMobileSidebar(forceClose = null) {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      const isOpen = !sidebar.classList.contains('-translate-x-full');
      const shouldClose = forceClose !== null ? forceClose : isOpen;
      sidebar.classList.toggle('-translate-x-full', shouldClose);
      overlay.classList.toggle('hidden', shouldClose);
    }

    // Démarrage du script de garde au chargement
    window.addEventListener('DOMContentLoaded', checkUserSession);
  </script>
</body>
</html>
