<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HubForge - Authentification</title>
  
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    :root {
      --bg-main: #05050e;
      --bg-card: #0c0c16;
      --bg-input: #141423;
      --border: #1e1e38;
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --error: #ef4444;
      --success: #22c55e;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6);
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      width: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      background-size: 200% 100%;
      display: none;
      animation: shift-load 1.5s infinite linear;
    }

    @keyframes shift-load {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .brand span {
      font-weight: 300;
      color: var(--text-muted);
    }

    /* Bandeau d'alerte supérieur */
    .alert-banner {
      display: none;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 24px;
      border: 1px solid transparent;
    }

    .alert-banner.error {
      background-color: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.25);
      color: var(--error);
    }

    .alert-banner.success {
      background-color: rgba(34, 197, 94, 0.08);
      border-color: rgba(34, 197, 94, 0.25);
      color: var(--success);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .label-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label-icon {
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }

    label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .forgot-link {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
    }

    input {
      width: 100%;
      background-color: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: 12px;
      padding: 14px 16px; 
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .field-status {
      font-size: 12px;
      margin-top: 6px;
      font-weight: 500;
      display: block;
      color: var(--text-muted);
    }

    .field-status.invalid { color: var(--error); }
    .field-status.valid { color: var(--success); }

    .submit-btn {
      width: 100%;
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      display: none;
      animation: spin 0.8s infinite linear;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .switch-mode {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .switch-mode toggle {
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <div id="loading-bar" class="progress-bar"></div>
    
    <div class="brand">
      <i data-lucide="layers" style="width: 22px; height: 22px; color: var(--accent);"></i>
      HUB<span>FORGE</span>
    </div>

    <div id="global-alert" class="alert-banner error">
      <i id="alert-icon" data-lucide="alert-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
      <span id="alert-text"></span>
    </div>

    <form id="auth-form" onsubmit="handleAuthSubmit(event)" novalidate>
      
      <div class="form-group">
        <div class="label-row">
          <div class="label-container">
            <span class="label-icon"><i data-lucide="mail" style="width: 13px; height: 13px;"></i></span>
            <label for="email">Adresse E-mail</label>
          </div>
        </div>
        <input type="email" id="email" placeholder="nom@exemple.com" oninput="validateForm()" required>
        <p id="email-status" class="field-status">En attente de saisie...</p>
      </div>

      <div class="form-group">
        <div class="label-row">
          <div class="label-container">
            <span class="label-icon"><i data-lucide="lock" style="width: 13px; height: 13px;"></i></span>
            <label for="password">Mot de passe</label>
          </div>
          <a href="reset-password.html" id="forgot-password-link" class="forgot-link">Oublié ?</a>
        </div>
        <input type="password" id="password" placeholder="••••••••••••" oninput="validateForm()" required>
        <p id="password-status" class="field-status">En attente de saisie...</p>
      </div>

      <button type="submit" id="submit-btn" class="submit-btn">
        <div class="spinner" id="btn-spinner"></div>
        <span id="btn-text">Se connecter</span>
      </button>
    </form>

    <div class="switch-mode">
      <span id="switch-text">Nouveau sur la plateforme ?</span>
      <toggle id="switch-btn" onclick="toggleMode()">Créer un compte</toggle>
    </div>
  </div>

  <script>
    let supabaseClient = null;
    let isSignUpMode = false;

    window.addEventListener('load', () => {
      if (typeof supabase !== 'undefined') {
        const SUPABASE_URL = "https://ksqgxnfvqvyseivwzgaf.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_CVVb_9oBaayoatvTLmLDbg_xVlNP3he";
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });

    function toggleMode() {
      isSignUpMode = !isSignUpMode;
      document.getElementById('global-alert').style.display = 'none';
      
      const btnText = document.getElementById('btn-text');
      const switchText = document.getElementById('switch-text');
      const switchBtn = document.getElementById('switch-btn');
      const forgotLink = document.getElementById('forgot-password-link');

      if (isSignUpMode) {
        btnText.innerText = "Créer un compte";
        switchText.innerText = "Vous avez déjà un compte ?";
        switchBtn.innerText = "Se connecter";
        forgotLink.style.display = "none";
      } else {
        btnText.innerText = "Se connecter";
        switchText.innerText = "Nouveau sur la plateforme ?";
        switchBtn.innerText = "Créer un compte";
        forgotLink.style.display = "block";
      }
      validateForm();
    }

    function validateForm() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const emailStatus = document.getElementById('email-status');
      const passwordStatus = document.getElementById('password-status');
      
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      let isValid = true;

      if (!email) {
        emailStatus.innerText = "L'adresse e-mail est requise.";
        emailStatus.className = "field-status invalid";
        isValid = false;
      } else if (!emailRegex.test(email)) {
        emailStatus.innerText = "Format d'adresse e-mail incorrect.";
        emailStatus.className = "field-status invalid";
        isValid = false;
      } else {
        emailStatus.innerText = "Format d'adresse e-mail valide.";
        emailStatus.className = "field-status valid";
      }

      if (!password) {
        passwordStatus.innerText = "Le mot de passe est requis.";
        passwordStatus.className = "field-status invalid";
        isValid = false;
      } else if (password.length < 6) {
        passwordStatus.innerText = "Le mot de passe doit contenir au moins 6 caractères.";
        passwordStatus.className = "field-status invalid";
        isValid = false;
      } else {
        passwordStatus.innerText = "Longueur de mot de passe valide.";
        passwordStatus.className = "field-status valid";
      }

      return isValid;
    }

    // Affiche une erreur rouge professionnelle
    function showProfessionalError(rawMessage) {
      const banner = document.getElementById('global-alert');
      const textSpan = document.getElementById('alert-text');
      const icon = document.getElementById('alert-icon');
      if (!banner) return;

      banner.className = "alert-banner error";
      icon.setAttribute('data-lucide', 'alert-circle');
      if (typeof lucide !== 'undefined') lucide.createIcons();

      let msgLower = rawMessage.toLowerCase();
      let localizedMessage = "Une erreur est survenue. Veuillez vérifier vos informations.";

      if (msgLower.includes("invalid login credentials")) {
        localizedMessage = "L'adresse e-mail ou le mot de passe est incorrect.";
      } else if (msgLower.includes("user already exists")) {
        localizedMessage = "Cette adresse e-mail est déjà associée à un compte hubForge.";
      } else if (msgLower.includes("rate limit")) {
        localizedMessage = "Trop de tentatives consécutives. Par sécurité, veuillez patienter un instant.";
      } else if (rawMessage.includes('Failed to fetch') || rawMessage.includes('NetworkError')) {
        localizedMessage = "Connexion réseau impossible. Vérifiez votre accès Internet.";
      }

      textSpan.innerText = localizedMessage;
      banner.style.display = 'flex';
    }

    // Affiche un succès vert premium sans utiliser de alert()
    function showProfessionalSuccess(message) {
      const banner = document.getElementById('global-alert');
      const textSpan = document.getElementById('alert-text');
      const icon = document.getElementById('alert-icon');
      if (!banner) return;

      banner.className = "alert-banner success";
      icon.setAttribute('data-lucide', 'check-circle');
      if (typeof lucide !== 'undefined') lucide.createIcons();

      textSpan.innerText = message;
      banner.style.display = 'flex';
    }

    async function handleAuthSubmit(event) {
      event.preventDefault();
      document.getElementById('global-alert').style.display = 'none';

      if (!validateForm()) return;
      if (!supabaseClient) return;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      const submitBtn = document.getElementById('submit-btn');
      const spinner = document.getElementById('btn-spinner');
      const btnText = document.getElementById('btn-text');
      const loadingBar = document.getElementById('loading-bar');

      submitBtn.disabled = true;
      spinner.style.display = 'block';
      loadingBar.style.display = 'block';
      const originalText = btnText.innerText;
      btnText.innerText = "Traitement...";

      try {
        if (isSignUpMode) {
          // --- 🔍 VÉRIFICATION : Consultation du registre public ---
          const { data: existingUser, error: searchError } = await supabaseClient
            .from('registered_emails')
            .select('email')
            .eq('email', email)
            .maybeSingle();

          if (searchError) throw new Error("network_error");

          // Si l'e-mail existe déjà dans notre registre, on bloque directement
          if (existingUser) {
            showProfessionalError("User already exists");
            return;
          }

          // --- INSCRIPTION SÉCURISÉE ---
          const { data, error } = await supabaseClient.auth.signUp({ email, password });
          if (error) throw error;
          
          showProfessionalSuccess("Inscription réussie ! Veuillez vérifier votre boîte e-mail pour confirmer votre compte.");
          toggleMode(); 
        } else {
          // --- CONNEXION ---
          const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
          if (error) throw error;
          
          window.location.href = "dashboard.html";
        }
      } catch (err) {
        if (err.message === "network_error") {
          showProfessionalError("Connexion réseau impossible. Vérifiez votre accès Internet.");
        } else {
          showProfessionalError(err.message || err.toString());
        }
      } finally {
        submitBtn.disabled = false;
        spinner.style.display = 'none';
        loadingBar.style.display = 'none';
        btnText.innerText = originalText;
      }
    }
  </script>
</body>
</html>
