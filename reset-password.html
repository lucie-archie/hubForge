<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HubForge - Récupération de compte</title>
  
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    :root {
      --bg-main: #05050e;
      --bg-card: #0c0c16;
      --bg-input: #141423;
      --border: #1e1e38;
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --error: #ef4444;
      --success: #22c55e;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6);
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      width: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      background-size: 200% 100%;
      display: none;
      animation: shift-load 1.5s infinite linear;
    }

    @keyframes shift-load {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .brand span {
      font-weight: 300;
      color: var(--text-muted);
    }

    /* Bandeau de notification d'erreur */
    .alert-banner {
      display: none;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 24px;
      border: 1px solid transparent;
    }

    .alert-banner.error {
      background-color: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.25);
      color: var(--error);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .label-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label-icon {
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }

    label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .back-link {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
    }

    input {
      width: 100%;
      background-color: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: 12px;
      padding: 14px 16px; 
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .field-status {
      font-size: 12px;
      margin-top: 6px;
      font-weight: 500;
      display: block;
      color: var(--text-muted);
    }

    .field-status.invalid { color: var(--error); }
    .field-status.valid { color: var(--success); }

    .submit-btn {
      width: 100%;
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      display: none;
      animation: spin 0.8s infinite linear;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px 0;
      animation: baseFade 0.4s ease forwards;
    }

    .success-icon-wrapper {
      width: 60px;
      height: 60px;
      background-color: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--success);
      margin-bottom: 20px;
    }

    .success-screen h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .success-screen p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    @keyframes baseFade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <div id="loading-bar" class="progress-bar"></div>
    
    <div id="auth-content-wrapper">
      <div class="brand">
        <i data-lucide="layers" style="width: 22px; height: 22px; color: var(--accent);"></i>
        HUB<span>FORGE</span>
      </div>

      <div id="global-alert" class="alert-banner error">
        <i data-lucide="alert-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
        <span id="alert-text"></span>
      </div>

      <form id="reset-form" onsubmit="handleResetSubmit(event)" novalidate>
        
        <div class="form-group">
          <div class="label-row">
            <div class="label-container">
              <span class="label-icon"><i data-lucide="mail" style="width: 13px; height: 13px;"></i></span>
              <label for="email">Adresse E-mail de récupération</label>
            </div>
            <a href="auth.html" class="back-link">Retour</a>
          </div>
          <input type="email" id="email" placeholder="nom@exemple.com" oninput="validateEmail()" required>
          <p id="email-status" class="field-status">En attente de saisie...</p>
        </div>

        <button type="submit" id="submit-btn" class="submit-btn">
          <div class="spinner" id="btn-spinner"></div>
          <span id="btn-text">Envoyer le lien</span>
        </button>
      </form>
    </div>

    <div id="success-view" class="success-screen">
      <div class="success-icon-wrapper">
        <i data-lucide="send" style="width: 24px; height: 24px;"></i>
      </div>
      <h3>Demande prise en compte</h3>
      <p>Si cette adresse correspond à un compte actif, un e-mail contenant le lien sécurisé de réinitialisation lui sera immédiatement transmis.</p>
    </div>
  </div>

  <script>
    let supabaseClient = null;

    // Initialisation au chargement de la page
    window.addEventListener('load', () => {
      if (typeof supabase !== 'undefined') {
        const SUPABASE_URL = "https://ksqgxnfvqvyseivwzgaf.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_CVVb_9oBaayoatvTLmLDbg_xVlNP3he";
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });

    // Validation syntaxique locale de l'e-mail
    function validateEmail() {
      const email = document.getElementById('email').value.trim();
      const status = document.getElementById('email-status');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!email) {
        status.innerText = "L'adresse e-mail est requise.";
        status.className = "field-status invalid";
        return false;
      } else if (!emailRegex.test(email)) {
        status.innerText = "Format d'adresse e-mail incorrect.";
        status.className = "field-status invalid";
        return false;
      }
      status.innerText = "Format d'adresse e-mail valide.";
      status.className = "field-status valid";
      return true;
    }

    // Affichage filtré et masquage des erreurs système brutes
    function showProfessionalError(customMessage) {
      const banner = document.getElementById('global-alert');
      const textSpan = document.getElementById('alert-text');
      if (!banner) return;

      // Utilise le message personnalisé passé en paramètre ou applique la phrase globale
      textSpan.innerText = customMessage || "Une erreur est survenue. Veuillez vérifier la saisie de votre adresse e-mail ou réessayer ultérieurement si le problème persiste.";
      banner.style.display = 'flex';
    }

    // Gestion de la soumission du formulaire
    async function handleResetSubmit(event) {
      event.preventDefault();
      document.getElementById('global-alert').style.display = 'none';

      if (!validateEmail()) return;
      if (!supabaseClient) return;

      const email = document.getElementById('email').value.trim();
      const submitBtn = document.getElementById('submit-btn');
      const spinner = document.getElementById('btn-spinner');
      const btnText = document.getElementById('btn-text');
      const loadingBar = document.getElementById('loading-bar');

      // Verrouillage de l'interface graphique pendant le traitement
      submitBtn.disabled = true;
      spinner.style.display = 'block';
      loadingBar.style.display = 'block';
      btnText.innerText = "Vérification...";

      try {
        // --- 🔍 ÉTAPE 1 : Consultation discrète du registre public ---
        const { data, error: searchError } = await supabaseClient
          .from('registered_emails')
          .select('email')
          .eq('email', email)
          .maybeSingle(); // Renvoie null sans crasher si l'email n'existe pas

        if (searchError) throw new Error("network_error");

        // Si data est null, l'utilisateur n'existe pas en BDD
        if (!data) {
          showProfessionalError("Cette adresse e-mail ne correspond à aucun compte hubForge enregistré.");
          resetButtonState();
          return;
        }

        // --- ✉️ ÉTAPE 2 : Déclenchement de l'envoi Supabase si l'e-mail est valide ---
        btnText.innerText = "Envoi du lien...";
        const { error: resetError } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/update-password.html',
        });

        if (resetError) {
          // Interception de l'erreur de quota (Email rate limit)
          if (resetError.message.toLowerCase().includes('rate limit')) {
            showProfessionalError("Trop de demandes consécutives. Par mesure de sécurité, veuillez patienter quelques minutes avant de réessayer.");
          } else {
            showProfessionalError(); // Message passe-partout standard
          }
          resetButtonState();
          return;
        }

        // Succès complet : Basculement propre de l'affichage
        loadingBar.style.display = 'none';
        document.getElementById('auth-content-wrapper').style.display = 'none';
        document.getElementById('success-view').style.display = 'flex';

      } catch (err) {
        if (err.message === "network_error") {
          showProfessionalError("Connexion au serveur perdue. Vérifiez votre accès Internet.");
        } else {
          showProfessionalError();
        }
        resetButtonState();
      }

      // Restauration de l'état d'origine du bouton d'action
      function resetButtonState() {
        submitBtn.disabled = false;
        spinner.style.display = 'none';
        loadingBar.style.display = 'none';
        btnText.innerText = "Envoyer le lien";
      }
    }
  </script>
</body>
</html>
