<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HubForge - Récupération de compte</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: radial-gradient(circle at center, #090514 0%, #020204 100%); }
    .text-neon-purple { text-shadow: 0 0 10px rgba(167, 139, 250, 0.6); color: #a78bfa; }
    .btn-neon-purple { background-color: #5850ec; color: #ffffff; box-shadow: 0 4px 12px rgba(88, 80, 236, 0.3); transition: all 0.3s ease; }
    .btn-neon-purple:hover { background-color: #4f46e5; box-shadow: 0 0 20px rgba(88, 80, 236, 0.6); }
    .input-dark-neon { background-color: #161925; border: 1px solid #23283e; }
    .input-dark-neon:focus-within { border-color: #5850ec; box-shadow: 0 0 10px rgba(88, 80, 236, 0.2); }
  </style>
</head>
<body class="text-gray-300 font-sans min-h-screen flex items-center justify-center p-4 overflow-x-hidden box-border">

  <div class="w-full max-w-md bg-[#110d21]/60 border border-indigo-950/40 rounded-2xl p-6 sm:p-8 backdrop-blur-md shadow-2xl box-border">
    <div class="flex items-center justify-center gap-2 font-black text-xl text-white tracking-wider mb-6">
      <div class="p-2 bg-indigo-500/10 rounded-lg text-indigo-400 border border-indigo-500/20">
        <i data-lucide="layers" class="w-5 h-5"></i>
      </div>
      HUB<span class="text-neon-purple">FORGE</span>
    </div>

    <h2 id="form-title" class="text-center text-sm font-bold uppercase tracking-wider text-white mb-6">Récupération d'accès</h2>

    <form id="request-form" class="space-y-5">
      <p class="text-xs text-gray-400 leading-relaxed text-center">Saisissez votre adresse e-mail. Nous allons vérifier votre compte pour vous transmettre un lien sécurisé.</p>
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-2">Adresse E-mail</label>
        <div class="relative flex items-center input-dark-neon rounded-xl">
          <input type="email" id="request-email" required class="w-full bg-transparent py-3.5 px-4 text-sm text-white focus:outline-none" placeholder="nom@exemple.com">
        </div>
      </div>
      <button type="submit" id="request-btn" class="w-full btn-neon-purple py-3.5 px-4 rounded-xl text-xs font-bold uppercase tracking-wider cursor-pointer">
        Vérifier et envoyer le lien
      </button>
      <div class="text-center mt-4">
        <a href="auth.html" class="text-xs text-gray-500 hover:text-indigo-400 transition-colors">Retour à la connexion</a>
      </div>
    </form>

    <form id="update-form" class="space-y-5 hidden">
      <p class="text-xs text-gray-400 leading-relaxed text-center">Créez maintenant votre nouveau mot de passe sécurisé.</p>
      <div>
        <label class="block text-xs font-semibold text-gray-400 mb-2">Nouveau mot de passe</label>
        <div class="relative flex items-center input-dark-neon rounded-xl">
          <input type="password" id="new-password" required class="w-full bg-transparent py-3.5 px-4 text-sm text-white focus:outline-none" placeholder="••••••••">
        </div>
      </div>
      <button type="submit" class="w-full btn-neon-purple py-3.5 px-4 rounded-xl text-xs font-bold uppercase tracking-wider cursor-pointer">
        Mettre à jour le mot de passe
      </button>
    </form>
  </div>

  <script>
    lucide.createIcons();

    const SUPABASE_URL = "https://ksqgxnfvqvyseivwzgaf.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_CVVb_9oBaayoatvTLmLDbg_xVlNP3he";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Détection si l'on revient du mail de récupération
    window.addEventListener('DOMContentLoaded', () => {
      // Supabase renvoie les tokens dans l'URL après un reset pass
      if (window.location.hash.includes('type=recovery') || window.location.href.includes('access_token=')) {
        document.getElementById('form-title').innerText = "Changement de passe";
        document.getElementById('request-form').classList.add('hidden');
        document.getElementById('update-form').classList.remove('hidden');
      }
    });

    // Gestion Étape 1 : Vérification réelle et Envoi
    document.getElementById('request-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('request-email').value.trim();
      const btn = document.getElementById('request-btn');
      
      btn.innerText = "Vérification...";
      btn.disabled = true;

      try {
        // Appeler une fonction de RPC anonyme ou chercher dans profiles si tu stockes l'email.
        // Si ton Supabase n'expose pas les emails dans "public.profiles", on lance la requête standard.
        // Pour avoir un vrai retour utilisateur immédiat et pro :
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + window.location.pathname, // Renvoie EXACTEMENT sur cette page
        });

        if (error) {
          alert("Erreur : " + error.message);
        } else {
          alert("✓ Un lien de récupération sécurisé vient de vous être envoyé par e-mail.");
        }
      } catch (err) {
        alert("Une erreur est survenue.");
      } finally {
        btn.innerText = "Vérifier et envoyer le lien";
        btn.disabled = false;
      }
    });

    // Gestion Étape 2 : Enregistrement du nouveau mot de passe
    document.getElementById('update-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('new-password').value;

      if(newPassword.length < 6) { alert("Le mot de passe doit faire 6 caractères minimum."); return; }

      const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

      if (error) { 
        alert("Erreur lors de la mise à jour : " + error.message); 
      } else { 
        alert("✓ Votre mot de passe a été mis à jour avec succès !"); 
        window.location.href = 'auth.html';
      }
    });
  </script>
</body>
</html>
