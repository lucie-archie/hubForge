<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HubForge - Sécurisation du Compte</title>
  
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    :root {
      --bg-main: #04040a;
      --bg-card: #0e0e1f;
      --bg-input: #15152e;
      --border: #202042;
      --text-main: #f1f5f9;
      --text-muted: #64748b;
      --accent: #6366f1;
      --success: #10b981;
      --error: #f43f5e;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(145deg, var(--bg-card), #111126);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .brand-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 32px;
      color: var(--text-main);
    }
    .brand-header span { font-weight: 300; color: var(--text-muted); }

    h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.5; }

    .input-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }

    .input-label {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: block;
    }

    .input-wrapper {
      background-color: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .input-wrapper:focus-within { border-color: var(--accent); }

    .input-wrapper input {
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-size: 14px;
      width: 100%;
    }

    .status-msg {
      font-size: 12px;
      margin-top: -10px;
      margin-bottom: 20px;
      text-align: left;
      display: none;
    }

    .submit-btn {
      width: 100%;
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="brand-header">
      <i data-lucide="box" style="color: var(--accent); width:20px; height:20px;"></i> HUB<span>FORGE</span>
    </div>

    <h2>Nouveau mot de passe</h2>
    <p class="subtitle">Votre identité a été validée par jeton de récupération. Saisissez votre nouvelle clé d'accès.</p>

    <div class="input-group">
      <label class="input-label">Nouveau Mot de passe</label>
      <div class="input-wrapper">
        <i data-lucide="lock" style="color: var(--text-muted); width: 18px;"></i>
        <input type="password" id="pass-input" placeholder="6 caractères minimum" oninput="validatePasswords()">
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">Confirmez le mot de passe</label>
      <div class="input-wrapper">
        <i data-lucide="shield-check" style="color: var(--text-muted); width: 18px;"></i>
        <input type="password" id="confirm-input" placeholder="Répétez le mot de passe" oninput="validatePasswords()">
      </div>
    </div>

    <div id="feedback-text" class="status-msg"></div>

    <button id="action-submit" class="submit-btn" onclick="executePasswordUpdate()" disabled>
      <i data-lucide="key-round" style="width: 16px;"></i> Mettre à jour l'accès
    </button>
  </div>

  <script>
    let supabaseClient = null;

    window.addEventListener('load', () => {
      // Clé et URL de ton projet hubForge
      const SUPABASE_URL = "https://ksqgxnfvqvyseivwzgaf.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_CVVb_9oBaayoatvTLmLDbg_xVlNP3he";
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });

    function validatePasswords() {
      const pass = document.getElementById('pass-input').value;
      const confirm = document.getElementById('confirm-input').value;
      const feedback = document.getElementById('feedback-text');
      const btn = document.getElementById('action-submit');

      feedback.style.display = "block";

      if (pass.length < 6) {
        feedback.innerText = "Le mot de passe doit faire au moins 6 caractères.";
        feedback.style.color = "var(--error)";
        btn.disabled = true;
        return;
      }

      if (pass !== confirm) {
        feedback.innerText = "Les deux mots de passe ne correspondent pas.";
        feedback.style.color = "var(--error)";
        btn.disabled = true;
        return;
      }

      feedback.innerText = "Configuration conforme et sécurisée.";
      feedback.style.color = "var(--success)";
      btn.disabled = false;
    }

    async function executePasswordUpdate() {
      const newPassword = document.getElementById('pass-input').value;
      const btn = document.getElementById('action-submit');

      btn.disabled = true;
      btn.innerText = "Chiffrement et envoi...";

      // Envoi du nouveau mot de passe (Supabase utilise le Token présent dans l'URL en arrière-plan)
      const { error } = await supabaseClient.auth.updateUser({
        password: newPassword
      });

      if (error) {
        const feedback = document.getElementById('feedback-text');
        feedback.innerText = "Erreur Supabase : " + error.message;
        feedback.style.color = "var(--error)";
        btn.disabled = false;
        btn.innerText = "Mettre à jour l'accès";
      } else {
        alert("Votre mot de passe a été modifié avec succès ! Redirection vers la page de connexion...");
        window.location.replace("auth.html");
      }
    }
  </script>
</body>
</html>
